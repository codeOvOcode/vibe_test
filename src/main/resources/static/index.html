<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校选课管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>高校选课管理系统</h1>

        <section class="import-section">
            <h2>数据批量导入</h2>
            <textarea id="csvInput" rows="8" placeholder="请输入CSV格式选课数据，每行一条：
S000001,C000001,Java程序设计,专业课
S000002,C000003,计算机网络,公共课"></textarea>
            <div class="btn-row">
                <button id="importBtn">导入数据</button>
                <span id="importMsg" class="msg"></span>
            </div>
        </section>

        <section class="search-section">
            <h2>选课检索</h2>
            <div class="search-bar">
                <input type="text" id="searchKeyword" placeholder="请输入关键词">
                <select id="searchType">
                    <option value="studentId">学生ID</option>
                    <option value="courseId">课程ID</option>
                    <option value="courseName">课程名称</option>
                    <option value="courseType">课程类型</option>
                </select>
                <button id="searchBtn">搜索</button>
            </div>
        </section>

        <section class="display-section">
            <h2>数据展示</h2>
            <div id="displayArea">
                <p class="loading">加载中...</p>
            </div>
        </section>
    </div>
    <script type="module" src="/js/main.js"></script>
</body>
</html>
